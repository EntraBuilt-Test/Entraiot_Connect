<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0" />
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <link rel="shortcut icon" href="favicon.ico" type="image/x-icon" />
    <link rel="apple-touch-icon" href="apple-touch-icon.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Zen+Dots&display=swap" rel="stylesheet" />
    <title>Entraiot Solution :: Web Engineer :: Portfolio</title>
    <meta
      name="description"
      content="I'm Entraiot Solution, a french 'Gen X' Web Engineer. Throughout my career, I have worked on multiple sized projects in various roles, including Project Manager, Designer and Front/Back-end Developer."
    />
    <style>
      body {
        background-color: #e4e4e4;
      }
      :root {
        --france-color: #e4e4e4;
        --luxembourg-color: #e4e4e4;
        --belgium-color: #e4e4e4;
      }
      #preloader {
        --progress: 0;
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background-color: transparent;
        z-index: 999999999;
        pointer-events: none;
        display: grid;
        place-content: center;
        &.preloader--france {
          background-color: var(--france-color);
        }
        &.preloader--luxembourg {
          background-color: var(--luxembourg-color);
        }
        &.preloader--belgium {
          background-color: var(--belgium-color);
        }
        & code {
          display: block;
          position: absolute;
          z-index: 0;
          bottom: auto;
          left: 50%;
          transform: translateX(-50%);
          font-family: "Zen Dots", sans-serif;
          font-size: 15vmin;
          letter-spacing: 0.15em;
          opacity: 0.05;
          transition: opacity 1200ms ease;
        }
        & > div.motorbike {
          position: relative;
          z-index: 1;
          left: 0;
          top: -55px;
          opacity: 0;
          transform-origin: center bottom;
          transform: scale(0.8);
          transition: opacity 600ms cubic-bezier(0.22, 0.61, 0.36, 1), left 600ms cubic-bezier(0.22, 0.61, 0.36, 1);
          &::after,
          &::before {
            content: "";
            display: block;
            width: 88px;
            height: 88px;
            position: absolute;
            z-index: 0;
            bottom: -20px;
            background-image: url("/image/motorbike-wheel.png");
            animation: wheelAnimation 220ms linear infinite;
          }
          &::after {
            left: 10px;
          }
          &::before {
            right: -10px;
          }

          & > img {
            animation: motocycleAnimation 15ms infinite alternate;
            position: relative;
            z-index: 1;
          }
          &.active {
            opacity: 1;
            left: 0;
            &::after {
              opacity: 1;
            }
          }
        }
        & > .city {
          content: "";
          display: block;
          position: absolute;
          top: 50%;
          left: 50%;
          transform: translateX(-50%) translateY(-50%);
          width: 1000px;
          height: 186px;
          background-image: url("/image/city.png");
          mask: radial-gradient(circle, black 25%, transparent 75%);
          opacity: 0.25;
          background-repeat: repeat-x;
          background-position: 0 0;
          animation: cityAnimation 5s linear infinite;
          transition: opacity 1200ms cubic-bezier(0.22, 0.61, 0.36, 1) 450ms;
        }
        & > .preloader-enter {
          position: absolute;
          top: 50%;
          left: 50%;
          transform: translate(-50%, -50%);
          z-index: 999;
          display: flex;
          flex-direction: column;
          text-align: center;
          &::before {
            content: "";
            display: block;
            width: 25dvw;
            height: 105px;
            transform: translateY(5px);
            background-image: url("/image/preload-monuments.png");
            background-position: 0 0;
            margin: 0 auto;
            transition: clip-path 500ms ease 50ms;
            clip-path: inset(0 0 0 100%);
            animation: monumentsAnimation 8s linear infinite;
          }
          & > .button-start {
            display: block;
            position: relative;
            background-color: transparent;
            border: 2px solid #d3b3c9;
            min-width: 25dvw;
            background: #8b7082;
            text-transform: uppercase;
            color: white;
            border-radius: 3px;
            padding: 10px 20px;
            font-size: 1.5em;
            cursor: pointer;
            margin: 0 auto;
            transition: background-color 300ms ease;
            font-family: "zen dots", sans-serif;
            text-align: center;
            text-decoration: none;
            pointer-events: fill;
            clip-path: inset(0 100% 0px 0);
            transition: clip-path 500ms ease-out 50ms, background-color 300ms ease;
            &::after {
              content: "";
              display: block;
              position: absolute;
              top: -115px;
              left: 50%;
              width: 300px;
              background: radial-gradient(ellipse at center, #f0eff0 -60%, transparent 55%) padding-box;
              mix-blend-mode: plus-lighter;
              height: 300px;
              opacity: 0.6;
              transform: translateX(-50%) scale(1.5);
            }
            &:hover {
              background-color: #5c4655;
              color: #fff;
            }
          }
          & > p {
            clip-path: inset(0 100% 0 0);
            transition: clip-path 500ms ease-out 50ms;
            font-size: medium;
            margin: 5px 0;
            letter-spacing: 0.2em;
            &:nth-of-type(1) {
              margin-top: 25px;
            }
          }
        }
        &.end {
          & > div.motorbike {
            transition-duration: 1200ms;
            left: 400px;
            opacity: 0;
          }
          & code {
            opacity: 0;
          }
          & > .city,
          &::after {
            opacity: 0;
          }
          & > .preloader-enter {
            &::before {
              opacity: 0.85;
              clip-path: inset(0 0 0 0);
              pointer-events: none;
            }
            & > .button-start {
              clip-path: inset(0 0 0 0);
            }
            & > p {
              clip-path: inset(0 0 0 0);
              pointer-events: none;
            }
          }
        }
      }
      html.html--loaded #preloader {
        &::after {
          display: none;
        }
      }
      #awards {
        position: fixed;
        width: 100%;
        bottom: 10dvh;
        z-index: 999999999;
        pointer-events: painted;
        transition: opacity 1200ms ease;
        mix-blend-mode: darken;
        & > div {
          display: flex;
          align-items: center;
          gap: 50px;
          justify-content: center;
        }
        &.end {
          opacity: 0;
          pointer-events: none;
          & > div {
            pointer-events: none;
          }
        }
      }
      #cookie {
        position: fixed;
        bottom: 0;
        left: 0;
        width: 100%;
        background-color: hsla(0, 0%, 0%, 0.6);
        color: white;
        padding: 10px;
        text-align: center;
        z-index: 999999999999999999999999;
        transform: translateY(100%);
        transition: transform 1200ms ease;
        &.disabled {
          transform: translateY(100%) !important;
        }
        & button {
          font-family: "zen dots", sans-serif;
          background-color: hsla(0, 0%, 0%, 0.6);
          color: white;
          border: 1px solid white;
          padding: 5px 20px;
          cursor: pointer;
          transition: background-color 300ms ease;
          &:hover {
            transition: transform 800ms ease;
            background-color: hsla(0, 0%, 0%, 0.1);
          }
        }
      }
      #preloader.end + #cookie,
      html.html--loaded #cookie:not(.disabled) {
        transform: none;
      }
      @keyframes motocycleAnimation {
        from {
          transform: scaleY(0.98);
        }
        to {
          transform: scaleY(1);
        }
      }
      @keyframes cityAnimation {
        to {
          background-position-x: -2000px;
        }
      }
      @keyframes wheelAnimation {
        to {
          transform: rotate(360deg);
        }
      }
      @keyframes monumentsAnimation {
        to {
          background-position-x: calc((80px * 3) * -1);
        }
      }
      @media screen and (max-width: 430px) {
        #preloader {
          & > .city {
            top: 40dvh;
          }
          & code {
            font-size: 40vmin;
          }
          & > div.motorbike {
            transform: scale(0.5);
            top: -115px;
          }
          & > .preloader-enter {
            width: 95vw;
            text-align: center;
            & > a.button-start {
              min-width: 100%;
            }
            &::before {
              width: 100%;
            }
            & > p {
              font-size: medium;
            }
          }
        }
        html.html--loaded #preloader {
          &.end {
            & > div.motorbike {
              left: 100vw;
            }
          }
        }
        #awards {
          bottom: 3dvh;
          & > div {
            gap: 2px 20px;
            flex-wrap: wrap;
            max-width: 100vw;
            margin: 0 auto;
            transform: scale(0.8);
          }
        }
        #cookie,
        #cookie button {
          font-size: small;
        }
      }
    </style>
    <script type="module" crossorigin src="/assets/index-Do2HjHOR.js"></script>
    <link rel="stylesheet" crossorigin href="/assets/index-CaPdr700.css">
  </head>
  <body>
    <div id="preloader" class="preloader--france" data-progress="0">
      <div class="motorbike">
        <img src="/image/motorbike.png" width="312" height="260" />
        <code>000</code>
      </div>
      <div class="city"></div>
      <div class="preloader-enter">
        <a href="javascript:void(0)" class="button-start"> start </a>
        <p>For the best experience</p>
        <p>Turn your sound on / Switch to desktop</p>
      </div>
    </div>
    <div id="awards">
      <div>
        <a href="https://www.awwwards.com/sites/sebastien-lempens" target="_blank"
          ><img src="/image/award-awwwards.png" width="73" height="70" alt="https://www.awwwards.com/sites/sebastien-lempens"
        /></a>
        <a href="https://thefwa.com/cases/sebastien-lempens-portfolio" target="_blank"
          ><img src="/image/award-fwa.png" width="100" height="38" alt="https://thefwa.com/cases/sebastien-lempens-portfolio"
        /></a>
        <a href="https://www.cssdesignawards.com/sites/sebastien-lempens-portfolio/45305/" target="_blank"
          ><img
            src="/image/award-cssda.png"
            width="86"
            height="86"
            alt="https://www.cssdesignawards.com/sites/sebastien-lempens-portfolio/45305/"
        /></a>
        <a href="https://orpetron.com/sites/sebastien-lempens-portfolio/" target="_blank"
          ><img src="/image/award-orpetron.png" width="68" height="69" alt="https://orpetron.com/sites/sebastien-lempens-portfolio/"
        /></a>
        <a href="https://wdawards.com/web/sbastien-lempens-portfolio" target="_blank"
          ><img src="/image/award-wd.png" width="98" height="31" alt="https://wdawards.com/web/sbastien-lempens-portfolio"
        /></a>
      </div>
    </div>
    <div id="cookie">
      <p style="text-wrap: balance">
        I use Analytics to collect anonymous data about how visitors use my site. This data helps me improve my website and provide a better
        user experience.<br />You can choose to accept or reject cookies by clicking the buttons below.
      </p>
      <div class="cookie-cta">
        <button class="cookie-cta-accept">Accept</button>
        <button class="cookie-cta-reject">Reject</button>
      </div>
    </div>
    <div id="root"></div>
    <script src="/vendors/momentum.min.js"></script>
    <script>
      console.log(`
                                              
 _____  __                                    
|   __||  |    ___  _____  ___  ___  ___  ___ 
|__   ||  |__ | -_||     || . || -_||   ||_ -|
|_____||_____||___||_|_|_||  _||___||_|_||___|
                         |_|                 
                                             `);
      document.addEventListener("DOMContentLoaded", () => {
        const preloader = document.querySelector("#preloader>div");
        const cookie = document.querySelector("#cookie");
        preloader.classList.add("active");
        if (sessionStorage.getItem("cookie-accepted") === "1") {
          cookie.classList.add("disabled");
        } else {
          const cookieAcceptButton = cookie.querySelector(".cookie-cta-accept");
          const cookieRejectButton = cookie.querySelector(".cookie-cta-reject");
          cookieRejectButton.addEventListener("click", () => {
            sessionStorage.setItem("cookie-accepted", 1);
            callGA();
            cookie.classList.add("disabled");
          });
          cookieAcceptButton.addEventListener("click", () => {
            sessionStorage.setItem("cookie-accepted", 1);
            callGA();
            cookie.classList.add("disabled");
          });
        }
        cookie.addEventListener("transitionend", ({ target }) => {
          if (target.classList.contains("disabled")) {
            target.remove();
          }
        });
        function callGA() {
          // Load Google Analytics
          const script = document.createElement("script");
          script.src = "https://www.googletagmanager.com/gtag/js?id=G-N9QMHXG4X1";
          script.async = true;
          document.head.appendChild(script);
          window.dataLayer = window.dataLayer || [];
          function gtag() {
            dataLayer.push(arguments);
          }
          gtag("js", new Date());
          gtag("config", "G-N9QMHXG4X1");
        }

        // --- Transition to Bike Project ---
        // The 3D scene shows "Thank You For Visiting" near the end.
        // We will wait until we see that message, and THEN wait for the screen to fade to white.
        let hasSeenThankYou = false;

        const checkEndInterval = setInterval(() => {
          // Check if the "Thank You For Visiting" text is active
          const thankYouText = document.querySelector('.befr-description.a .span');
          if (thankYouText && thankYouText.classList.contains('active')) {
            hasSeenThankYou = true;
          }

          // If we have seen the thank you text, wait for the final white fade
          if (hasSeenThankYou) {
            const whitePlane = document.querySelector('.white-plane');
            if (whitePlane) {
              const opacity = parseFloat(whitePlane.style.opacity || "0");
              if (opacity >= 0.99) {
                clearInterval(checkEndInterval);
                console.log("End of portfolio reached (white-plane fully visible). Transitioning to bike project...");
                
                setTimeout(() => {
                  window.parent.postMessage('portfolioEnded', '*');
                }, 500);
              }
            }
          }
        }, 500);
      });
    </script>

</body>
